name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ── Job 1: Build HTML site + release tarball ─────────────────────────────
  build-html:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for git describe --tags

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch shared assets
        run: python build/fetch_shared.py

      - name: Build HTML site
        run: python build/build.py

      - name: Create release tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          tar -czf "output/salvage-electronics-${VERSION}.tar.gz" -C output/html .

      - name: Upload HTML output
        uses: actions/upload-artifact@v4
        with:
          name: html-output
          path: output/html/
          retention-days: 1

      - name: Upload release tarball
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: output/salvage-electronics-*.tar.gz
          retention-days: 1

  # ── Job 2: Create GitHub Release ─────────────────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    needs: build-html

    steps:
      - name: Download release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: output/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: output/*.tar.gz
