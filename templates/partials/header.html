<header class="oc-header">
  <div class="oc-header-inner">
    <button id="oc-nav-toggle"
            class="oc-nav-toggle"
            aria-expanded="false"
            aria-controls="oc-sidebar"
            aria-label="Toggle table of contents">
      <svg width="18" height="14" viewBox="0 0 18 14" fill="none" aria-hidden="true" focusable="false">
        <rect y="0" width="18" height="2" rx="1" fill="currentColor"/>
        <rect y="6" width="18" height="2" rx="1" fill="currentColor"/>
        <rect y="12" width="18" height="2" rx="1" fill="currentColor"/>
      </svg>
    </button>
    <p class="oc-site-title">
      <a href="{{ home }}">Salvage Electronics</a>
    </p>
    <nav aria-label="Section navigation">
      <ul class="oc-vol-nav">
        <li><a href="{{ foundations }}"{% if section == 'foundations' %} class="is-active"{% endif %}>Foundations</a></li>
        <li><a href="{{ donor_guides }}"{% if section == 'donor-guides' %} class="is-active"{% endif %}>Donors</a></li>
        <li><a href="{{ components }}"{% if section == 'components' %} class="is-active"{% endif %}>Components</a></li>
        <li><a href="{{ projects }}"{% if section == 'projects' %} class="is-active"{% endif %}>Projects</a></li>
        <li><a href="/open-circuits/index.html">Theory</a></li>
      </ul>
    </nav>
  </div>
</header>
